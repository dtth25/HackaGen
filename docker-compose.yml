services:
  backend:
    container_name: ai-course-backend
    build:
      context: ./src
      dockerfile: backend/Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - ./.env
    environment:
      - PYTHONPATH=/app
    volumes:
      - ./runtime/uploads:/app/uploads
      - ./runtime/indices:/app/indices
      - ./runtime/questions:/app/questions
      - ./runtime/books:/app/books
      - ./runtime/slides:/app/slides
      - ./runtime/videos:/app/videos
