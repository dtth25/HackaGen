name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  backend:
    name: Backend (ruff + pytest)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: src/backend
    env:
      # Dummy values — enough for Settings' required-field validation to pass.
      # Tests run fully offline (PYTEST_CURRENT_TEST short-circuits the OpenRouter/TTS
      # clients in llm.py/video_render.py) and use an in-memory SQLite DB
      # (see tests/conftest.py), so no real secrets are needed here.
      DATABASE_URL: "sqlite:///./data/app.db"
      JWT_SECRET: "ci-test-secret-not-for-production"
      OPENROUTER_API_KEY: "test_openrouter_key"
      OPENROUTER_MODEL: "google/gemini-2.5-pro"
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: "latest"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: uv sync --extra dev

      - name: Ruff check
        run: uv run ruff check .

      - name: Pytest
        run: uv run pytest tests -q

  frontend:
    name: Frontend (lint + build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: src/frontend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: src/frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm run test

      - name: Build
        run: npm run build
